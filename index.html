<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Title</title>
    <style>
        /* Modal styles */
        .modal { /* styles */ }
        .modal-content { /* styles */ }
        .close { /* styles for close button */ }
    </style>
</head>
<body>

    <!-- Your existing HTML content -->
    <input type="email" id="emailInput" placeholder="Enter your email"> 
    <button onclick="sendOTP()">Nhận mã OTP</button>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <p id="modalMessage"></p>
        </div>
    </div>

    <script>
        function sendOTP() {
            // Assume that OTP sending logic is successful
            const userEmail = document.getElementById("emailInput").value; // Adjust based on your input ID
            document.getElementById("modalMessage").innerText = `An OTP has been sent to ${userEmail}. Please check your inbox.`;
            document.getElementById("successModal").style.display = "block"; // Show modal
        }

        // Function to close modal
        function closeModal() {
            document.getElementById("successModal").style.display = "none";
        }
    </script>
</body>
</html>
